name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg test tools
        run: choco install ffmpeg -y --no-progress

      - name: Run tests
        run: npm test

      - name: Build Windows x64 installer
        run: npm run app:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PetMo-Windows-x64
          path: release/PetMo-Setup-0.1.0.exe
          if-no-files-found: error
          retention-days: 14
